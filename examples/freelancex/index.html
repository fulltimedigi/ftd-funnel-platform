<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FreelanceX — التشخيص</title>
  <!-- Token defaults + structural styles. The theme (config.theme) is injected
       by the engine at runtime — this page is identical to the ASQ page except
       for the config path. -->
  <link rel="stylesheet" href="../../themes/_tokens.css" />
  <link rel="stylesheet" href="../../styles/base.css" />
</head>
<body>
  <!--
    Run from a local server (fetch() is blocked on file://):
      cd fulltimedigi-engine-v0 && python3 -m http.server 8000
      open http://localhost:8000/examples/freelancex/
  -->
  <main id="ftd-root"></main>
  <script type="module">
    import { boot } from "../../engine/index.js";
    boot({
      configUrl: "../../configs/freelancex.json",
      mountEl: document.getElementById("ftd-root"),
    });
  </script>
</body>
</html>
